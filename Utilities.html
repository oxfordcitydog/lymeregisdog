<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dog Utilities - Lyme Regis Dog</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #16697a; 
      display: flex; 
      flex-direction: column;
      align-items: center; 
      justify-content: flex-start; 
      min-height: 100vh; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      color: #ffffff;
      padding: 40px 20px;
    }
    
    /* Route Planner Container styling */
    .route-planner-container {
      width: 100%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      margin-bottom: 30px;
    }

    .route-planner-container h2 {
      font-size: 24px;
      margin-bottom: 20px;
      text-align: center;
      color: #fff;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #e0f2f1;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      font-size: 16px;
    }

    .btn-plan {
      width: 100%;
      padding: 14px;
      background: #ffa62b;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .btn-plan:hover {
      background: #f1931b;
    }

    /* Keep Bundler loader out of view as we build directly */
    #__bundler_loading { display: none !important; }
    #__bundler_thumbnail { display: none !important; }
  </style>
</head>
<body>

  <div class="route-planner-container">
    <h2>Lyme Regis Route Planner</h2>
    
    <div class="form-group">
      <label for="start">Starting Address / Postcode</label>
      <input type="text" id="start" placeholder="e.g. Uplyme, Dorset" required />
    </div>

    <div class="form-group">
      <label for="destination">Destination</label>
      <input type="text" id="destination" placeholder="e.g. Lyme Regis Beach" required />
    </div>

    <button class="btn-plan" onclick="calculateExternalRoute()">Plan Route</button>
  </div>
  <script>
    // Bulletproof routing handler: redirects cleanly to Google Maps with pre-filled locations
    function calculateExternalRoute() {
      const start = encodeURIComponent(document.getElementById('start').value.trim());
      const destination = encodeURIComponent(document.getElementById('destination').value.trim());

      if (!start || !destination) {
        alert("Please enter both a start location and a destination!");
        return;
      }

      // Safe, cross-device redirection protocol for external browser environments
      const mapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${start}&destination=${destination}&travelmode=driving`;
      window.open(mapsUrl, '_blank');
    }
  </script>

</body>
</html>
