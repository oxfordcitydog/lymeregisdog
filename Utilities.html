<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dog Utilities - Lyme Regis Dog</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #16697a; 
      display: flex; 
      flex-direction: column; /* Changed to column to stack the route planner nicely */
      align-items: center; 
      justify-content: flex-start; /* Changed to start so everything fits */
      min-height: 100vh; 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
      padding: 40px 20px;
    }
    
    /* STYLE FOR THE NEW ROUTE PLANNER */
    .route-planner-container {
      width: 100%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      margin-bottom: 30px;
      color: #ffffff;
      z-index: 10001; /* Keeps it on top of the loading screen */
    }
    .route-planner-container h2 {
      font-size: 24px;
      margin-bottom: 20px;
      text-align: center;
    }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #e0f2f1;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      font-size: 16px;
    }
    .btn-plan {
      width: 100%;
      padding: 14px;
      background: #ffa62b;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .btn-plan:hover {
      background: #f1931b;
    }

    /* ORIGINAL STYLES */
    #__bundler_loading { position: fixed; bottom: 20px; right: 20px; font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif; color: #666; background: #fff; padding: 8px 14px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.12); z-index: 10000; }
    #__bundler_thumbnail { position: fixed; inset: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #16697a; z-index: 9999; }
    #__bundler_thumbnail svg { width: 100%; height: 100%; object-fit: contain; }
    #__bundler_placeholder { color: #999; font-size: 14px; }
  </style>
  <noscript>
    <style>#__bundler_loading { display: none; }</style>
    <div style="position:fixed;bottom:12px;left:12px;font:13px/1.4 -apple-system,BlinkMacSystemFont,sans-serif;color:#999;background:rgba(255,255,255,0.9);padding:6px 12px;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.08);z-index:10000;">
      This page requires JavaScript to display.
    </div>
  </noscript>
</head>
<body>

  <div class="route-planner-container">
    <h2>Lyme Regis Route Planner</h2>
    
    <div class="form-group">
      <label for="start">Starting Address / Postcode</label>
      <input type="text" id="start" placeholder="e.g. Uplyme, Dorset" required />
    </div>

    <div class="form-group">
      <label for="destination">Destination</label>
      <input type="text" id="destination" placeholder="e.g. Lyme Regis Beach" required />
    </div>

    <button class="btn-plan" onclick="calculateExternalRoute()">Plan Route</button>
  </div>
  <div id="__bundler_thumbnail">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#16697a"></rect>
    <circle cx="530" cy="330" r="60" fill="#ffffff"></circle>
    <circle cx="670" cy="330" r="60" fill="#ffffff"></circle>
    <circle cx="460" cy="440" r="55" fill="#ffffff"></circle>
    <circle cx="740" cy="440" r="55" fill="#ffffff"></circle>
    <ellipse cx="600" cy="520" rx="110" ry="85" fill="#ffffff"></ellipse>
  </svg>
</div>
  <div id="__bundler_loading">Unpacking...</div>

  <script>
    // New Route Planner function
    function calculateExternalRoute() {
      const start = encodeURIComponent(document.getElementById('start').value.trim());
      const destination = encodeURIComponent(document.getElementById('destination').value.trim());

      if (!start || !destination) {
        alert("Please enter both a start location and a destination!");
        return;
      }

      const mapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${start}&destination=${destination}&travelmode=driving`;
      window.open(mapsUrl, '_blank');
    }

    // Your original unpacking code starts here
    document.addEventListener('DOMContentLoaded', async function() {
      const loading = document.getElementById('__bundler_loading');
      function setStatus(msg) { if (loading) loading.textContent = msg; }

      const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
      const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
      function toBase64(bytes) {
        let bin = '';
        for (let i = 0; i < bytes.length; i += 0x8000) {
          bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
        }
        return btoa(bin);
      }

      window.addEventListener('error', function(e) {
        if (!e.message && !e.error && e.target && e.target !== window) {
          console.warn('[bundle] resource failed to load:',
            e.target.tagName, String(e.target.src || e.target.href || ''));
          return;
        }
        var p = document.body || document.documentElement;
        var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
        d.id = '__bundler_err';
        d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
        d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
          '[bundle] ' + (e.message || e.type) +
          (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
      }, true);

      try {
        const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
        const templateEl = document.querySelector('script[type="__bundler/template"]');
        if (!manifestEl || !templateEl) {
          setStatus('Error: missing bundle data');
          console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
          return;
        }

        const manifest = JSON.parse(manifestEl.textContent);
        let template = JSON.parse(templateEl.textContent);

        const uuids = Object.keys(manifest);
        setStatus('Unpacking ' + uuids.length + ' assets...');

        const blobUrls = {};
        const resourceBlobs = {};
        await Promise.all(uuids.map(async (uuid) => {
          const entry = manifest[uuid];
          try {
            const binaryStr = atob(entry.data);
            const bytes = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

            let finalBytes = bytes;
            if (entry.compressed) {
              if (typeof DecompressionStream !== 'undefined') {
                const ds = new DecompressionStream('gzip');
                const writer = ds.writable.getWriter();
                const reader = ds.readable.getReader();
                writer.write(bytes);
                writer.close();
                const chunks = [];
                let totalLen = 0;
                while (true) {
                  const { done, value } = await reader.read();
                  if (done) break;
                  chunks.push(value);
                  totalLen += value.length;
                }
                finalBytes = new Uint8Array(totalLen);
                let offset = 0;
                for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
              } else {
                console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
              }
            }

            if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
              blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
                (entry.compressed ? toBase64(finalBytes) : entry.data);
            } else {
              const blob = new Blob([finalBytes], { type: entry.mime });
              blobUrls[uuid] = URL.createObjectURL(blob);
              resourceBlobs[blobUrls[uuid]] = blob;
            }
          } catch (err) {
            console.error('Failed to decode asset ' + uuid + ':', err);
            const blob = new Blob([], { type: entry.mime });
            blobUrls[uuid] = URL.createObjectURL(blob);
            resourceBlobs[blobUrls[uuid]] = blob;
          }
        }));

        const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
        const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
        const resourceMap = {};
        for (const entry of extResources) {
          if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
        }

        window.__resourceBlobs = resourceBlobs;

        setStatus('Rendering...');
        for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

        template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

        const resourceScript = '<script>window.__resources = ' +
          JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
          ';</' + 'script>';
        const headOpen = template.match(/<head[^>]*>/i);
        if (headOpen) {
          const i = headOpen.index + headOpen[0].length;
          template = template.slice(0, i) + resourceScript + template.slice(i);
        }

        const doc = new DOMParser().parseFromString(template, 'text/html');
        
        // Safety change: We append the unpacked elements so we don't completely wipe out our new Route Planner!
        const bodyChildren = Array.from(doc.body.children);
        bodyChildren.forEach(child => document.body.appendChild(child));
        
        const dead = Array.from(document.scripts);
        for (const old of dead) {
          if (old.type === "__bundler/manifest" || old.type === "__bundler/template" || old.type === "__bundler/ext_resources") continue;
          const s = document.createElement('script');
          for (const a of old.attributes) s.setAttribute(a.name, a.value);
          s.textContent = old.textContent;
          if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
            const pre = resourceBlobs[s.src.split('#')[0]];
            s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
            s.removeAttribute('src');
          }
          const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
          old.replaceWith(s);
          if (p) await p;
        }
        if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
          window.Babel.transformScriptTags();
        }
      } catch (err) {
        setStatus('Error unpacking: ' + err.message);
        console.error('Bundle unpack error:', err);
      }
    });
  </script>
