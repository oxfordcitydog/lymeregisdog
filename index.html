
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyme Regis Dog</title>
    <style>
        /* Base Styling */
        body {
            background-color: #E3F2FD; /* Pale blue background */
            color: #000000; /* Black text */
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Fixed Top Right Name */
        .fixed-title {
            position: fixed;
            top: 20px;
            right: 30px;
            font-size: 1.25rem;
            font-weight: bold;
            z-index: 1000;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Header and Intro */
        header {
            text-align: center;
            padding: 80px 20px 40px 20px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            max-width: 600px;
            margin: 0 auto;
            font-size: 1.1rem;
        }

        /* Navigation Menu */
        nav {
            position: relative;
            max-width: 700px;
            margin: 0 auto 60px auto;
            padding-bottom: 60px; /* Extra room for the wide tracks */
        }

        .nav-links {
            display: flex;
            justify-content: space-around;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-item {
            text-decoration: none;
            color: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            width: 120px;
            text-align: center;
        }

        /* Line Drawing Icons */
        .nav-item svg {
            width: 40px;
            height: 40px;
            stroke: black;
            stroke-width: 2;
            fill: none;
            margin-bottom: 8px;
            transition: filter 0.3s ease;
        }

        .nav-item span {
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* Icon Glow Filter */
        .nav-item:hover svg, .nav-item.glowing svg {
            filter: drop-shadow(0 0 10px #1976D2); 
        }

        /* Wide Track Space */
        .paw-tracks {
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 50px;
            pointer-events: none;
        }

        /* Individual Paw Styles */
        .paw {
            position: absolute;
            width: 20px;
            height: 20px;
            left: 0;
            opacity: 1;
            /* Slow, smooth fade so the lift and placement is highly visible */
            transition: opacity 0.3s ease-in-out; 
        }

        .paw svg {
            width: 100%;
            height: 100%;
            fill: black;
        }

        /* Main Content Area */
        main {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        @media (max-width: 500px) {
            .nav-links {
                flex-wrap: wrap;
                gap: 15px;
            }
            .nav-item {
                width: 40%;
            }
            .fixed-title {
                position: static;
                text-align: center;
                margin-top: 10px;
            }
            header {
                padding-top: 20px;
            }
            .paw-tracks {
                display: none; 
            }
        }
    </style>
</head>
<body>

    <div class="fixed-title">Lyme Regis Dog</div>

    <header>
        <h1>Welcome to Lyme Regis Dog</h1>
        <p>Discover the best dog-friendly walks, beaches, shops, cafes, and local tips for dogs and their owners.</p>
    </header>

    <nav>
        <div class="nav-links">
            <a href="#walks" class="nav-item">
                <!-- Labrador Walking Silhouette -->
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10 5.5c1.5-1 3.5-1 5 0 1 .5 2 1.5 2.5 3 .5 1.5 1 2 2 2h1.5c.8 0 1.5.7 1.5 1.5v1c0 .8-.7 1.5-1.5 1.5H19l-1.5 3H9.5c-2.5 0-4.5-1.5-6-3.5L2 12c-1-1.5 0-3 1.5-3h1.5c1.5 0 3-1 4-2.5L10 5.5z"/>
                    <path d="M16 10.5c-1 1-1.5 2.5-1 4"/>
                    <path d="M7 17v4"/>
                    <path d="M11 17v4"/>
                    <path d="M15 17v4"/>
                    <path d="M19 17v4"/>
                    <circle cx="20" cy="11" r="0.5" fill="black"/>
                </svg>
                <span>Walks</span>
            </a>
            
            <a href="#beaches" class="nav-item">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 20h.01m3.99 0h.01m3.99 0h.01m3.99 0h.01m3.99 0h.01m3.99 0h.01"></path>
                    <path d="M2 16c2.67-2 5.33-2 8 0s5.33 2 8 0 5.33-2 8 0"></path>
                    <circle cx="12" cy="8" r="4"></circle>
                </svg>
                <span>Beaches</span>
            </a>

            <a href="#shops-cafes" class="nav-item">
                <!-- Shop/Cafe Icon -->
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l1-4h16l1 4M4 9v11a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V9M9 14h6v7H9zM3 9h18"/>
                </svg>
                <span>Shops and Cafes</span>
            </a>

            <a href="#tips" class="nav-item">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                </svg>
                <span>Local Tips</span>
            </a>
        </div>

        <div class="paw-tracks">
            <div class="paw" id="back-left"><svg viewBox="0 0 24 24"><path d="M12 2c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3zm-6 3c-1.4 0-2.5 1.1-2.5 2.5S4.6 10 6 10s2.5-1.1 2.5-2.5S7.4 5 6 5zm12 0c-1.4 0-2.5 1.1-2.5 2.5s1.1 2.5 2.5 2.5 2.5-1.1 2.5-2.5S19.4 5 18 5zm-1.5 8c-.6-1.5-2.1-2.5-3.8-2.5h-1.4c-1.7 0-3.2 1-3.8 2.5L5 19h14l-2.5-6z"/></svg></div>
            <div class="paw" id="front-left"><svg viewBox="0 0 24 24"><path d="M12 2c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3zm-6 3c-1.4 0-2.5 1.1-2.5 2.5S4.6 10 6 10s2.5-1.1 2.5-2.5S7.4 5 6 5zm12 0c-1.4 0-2.5 1.1-2.5 2.5s1.1 2.5 2.5 2.5 2.5-1.1 2.5-2.5S19.4 5 18 5zm-1.5 8c-.6-1.5-2.1-2.5-3.8-2.5h-1.4c-1.7 0-3.2 1-3.8 2.5L5 19h14l-2.5-6z"/></svg></div>
            <div class="paw" id="back-right"><svg viewBox="0 0 24 24"><path d="M12 2c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3zm-6 3c-1.4 0-2.5 1.1-2.5 2.5S4.6 10 6 10s2.5-1.1 2.5-2.5S7.4 5 6 5zm12 0c-1.4 0-2.5 1.1-2.5 2.5s1.1 2.5 2.5 2.5 2.5-1.1 2.5-2.5S19.4 5 18 5zm-1.5 8c-.6-1.5-2.1-2.5-3.8-2.5h-1.4c-1.7 0-3.2 1-3.8 2.5L5 19h14l-2.5-6z"/></svg></div>
            <div class="paw" id="front-right"><svg viewBox="0 0 24 24"><path d="M12 2c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3zm-6 3c-1.4 0-2.5 1.1-2.5 2.5S4.6 10 6 10s2.5-1.1 2.5-2.5S7.4 5 6 5zm12 0c-1.4 0-2.5 1.1-2.5 2.5s1.1 2.5 2.5 2.5 2.5-1.1 2.5-2.5S19.4 5 18 5zm-1.5 8c-.6-1.5-2.1-2.5-3.8-2.5h-1.4c-1.7 0-3.2 1-3.8 2.5L5 19h14l-2.5-6z"/></svg></div>
        </div>
    </nav>

    <main>
        <h2>Select a category above to begin</h2>
        <p>More details and photos will go here as we build out the site!</p>
    </main>

    <!-- Natural Walking Gait Engine -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const navItems = document.querySelectorAll(".nav-item");
            const navContainer = document.querySelector("nav");
            
            const bLeft = document.getElementById("back-left");
            const fLeft = document.getElementById("front-left");
            const bRight = document.getElementById("back-right");
            const fRight = document.getElementById("front-right");
            
            let lastX = 0;
            let isMoving = false;

            function animateGait(element) {
                if (isMoving) return; 
                
                const elementRect = element.getBoundingClientRect();
                const navRect = navContainer.getBoundingClientRect();
                const targetCenter = elementRect.left - navRect.left + (elementRect.width / 2);
                
                if (targetCenter === lastX) return;
                isMoving = true;

                const isMovingRight = targetCenter > lastX;
                lastX = targetCenter;

                navItems.forEach(item => item.classList.remove('glowing'));
                element.classList.add('glowing');

                const rotation = isMovingRight ? 90 : -90;

                // Create a distinct 24-pixel vertical gap representing the body width
                const topLaneY = 0;   
                const bottomLaneY = 24; 

                // Map the correct paws to the correct lanes based on the heading direction
                const flY = isMovingRight ? topLaneY : bottomLaneY;
                const blY = isMovingRight ? topLaneY : bottomLaneY;
                const frY = isMovingRight ? bottomLaneY : topLaneY;
                const brY = isMovingRight ? bottomLaneY : topLaneY;

                // X-axis offsets to space out the front and back legs naturally
                const leadX = isMovingRight ? 12 : -12;
                const trailX = isMovingRight ? -16 : 16;

                // Function to execute the Lift -> Move -> Place sequence
                function takeStep(pawElement, targetX, targetY, delay) {
                    setTimeout(() => {
                        pawElement.style.opacity = "0"; // 1. Lift paw off page (fade out)
                        
                        setTimeout(() => {
                            // 2. Instantly update coordinates while completely invisible
                            pawElement.style.transform = `translateX(${targetX}px) translateY(${targetY}px) rotate(${rotation}deg)`;
                            
                            setTimeout(() => {
                                pawElement.style.opacity = "1"; // 3. Place paw down (fade in)
                            }, 50);
                        }, 300); // Waits for the 0.3s CSS opacity transition to finish
                    }, delay);
                }

                // Execute a staggered, natural 4-beat walk sequence
                takeStep(bRight, targetCenter + trailX - 10, brY, 0);     // Back Right lifts first
                takeStep(fRight, targetCenter + leadX - 10, frY, 200);    // Front Right follows
                takeStep(bLeft, targetCenter + trailX - 10, blY, 400);    // Back Left goes next
                takeStep(fLeft, targetCenter + leadX - 10, flY, 600);     // Front Left anchors it

                // Unlock movement once the sequence finishes
                setTimeout(() => { isMoving = false; }, 950);
            }

            // Set the initial wide stance under the first link
            if (navItems.length > 0) {
                const initialRect = navItems[0].getBoundingClientRect();
                const navRect = navContainer.getBoundingClientRect();
                const initialCenter = initialRect.left - navRect.left + (initialRect.width / 2);
                lastX = initialCenter;
                
                bRight.style.transform = `translateX(${initialCenter - 26}px) translateY(24px) rotate(90deg)`;
                fRight.style.transform = `translateX(${initialCenter + 2}px) translateY(24px) rotate(90deg)`;
                bLeft.style.transform = `translateX(${initialCenter - 26}px) translateY(0px) rotate(90deg)`;
                fLeft.style.transform = `translateX(${initialCenter + 2}px) translateY(0px) rotate(90deg)`;
            }

            navItems.forEach(item => {
                item.addEventListener("mouseenter", function() { animateGait(this); });
                item.addEventListener("touchstart", function() { animateGait(this); });
            });
        });
    </script>
</body>
</html>
