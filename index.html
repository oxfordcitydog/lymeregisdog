<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyme Regis Dog</title>
    <style>
        /* Base Styling */
        body {
            background-color: #E3F2FD; /* Pale blue background */
            color: #000000; /* Black text */
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Fixed Top Right Name */
        .fixed-title {
            position: fixed;
            top: 20px;
            right: 30px;
            font-size: 1.25rem;
            font-weight: bold;
            z-index: 1000;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Header and Intro */
        header {
            text-align: center;
            padding: 80px 20px 40px 20px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            max-width: 600px;
            margin: 0 auto;
            font-size: 1.1rem;
        }

        /* Navigation Menu */
        nav {
            position: relative;
            max-width: 600px;
            margin: 0 auto 60px auto;
            padding-bottom: 35px;
        }

        .nav-links {
            display: flex;
            justify-content: space-around;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-item {
            text-decoration: none;
            color: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            width: 80px;
            transition: transform 0.2s ease;
        }

        /* Line Drawing Icons with Glow Capability */
        .nav-item svg {
            width: 40px;
            height: 40px;
            stroke: black;
            stroke-width: 2;
            fill: none;
            margin-bottom: 8px;
            transition: filter 0.3s ease;
        }

        .nav-item span {
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* Icon Glow Filter when selected or hovered */
        .nav-item:hover svg, .nav-item.glowing svg {
            filter: drop-shadow(0 0 10px #1976D2); /* Coastal blue glow */
        }

        /* Direct Register Track Space */
        .paw-tracks {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20px;
            pointer-events: none;
        }

        /* Individual Paw Styles */
        .paw {
            position: absolute;
            width: 20px;
            height: 20px;
            left: 0;
            opacity: 1;
            /* Only transition opacity so it vanishes/reappears without sliding visibly */
            transition: opacity 0.15s ease-in-out; 
        }

        .paw svg {
            width: 100%;
            height: 100%;
            fill: black;
        }

        /* Main Content Area */
        main {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        /* Responsive adjustments for mobile screens */
        @media (max-width: 400px) {
            .nav-links {
                flex-wrap: wrap;
                gap: 20px;
            }
            .fixed-title {
                position: static;
                text-align: center;
                margin-top: 10px;
            }
            header {
                padding-top: 20px;
            }
            .paw-tracks {
                display: none; 
            }
        }
    </style>
</head>
<body>

    <!-- Fixed Corner Name -->
    <div class="fixed-title">Lyme Regis Dog</div>

    <header>
        <h1>Welcome to Lyme Regis Dog</h1>
        <p>Discover the best dog-friendly walks, beaches, attractions, and local tips for dogs and their owners.</p>
    </header>

    <!-- Navigation Area -->
    <nav>
        <div class="nav-links">
            <a href="#walks" class="nav-item">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 22s4-4 4-10-4-10-4-10"></path>
                    <path d="M12 22s4-4 4-10-4-10-4-10"></path>
                    <path d="M20 22s4-4 4-10-4-10-4-10"></path>
                </svg>
                <span>Walks</span>
            </a>
            
            <a href="#beaches" class="nav-item">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 20h.01m3.99 0h.01m3.99 0h.01m3.99 0h.01m3.99 0h.01m3.99 0h.01"></path>
                    <path d="M2 16c2.67-2 5.33-2 8 0s5.33 2 8 0 5.33-2 8 0"></path>
                    <circle cx="12" cy="8" r="4"></circle>
                </svg>
                <span>Beaches</span>
            </a>

            <a href="#attractions" class="nav-item">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg>
                <span>Attractions</span>
            </a>

            <a href="#tips" class="nav-item">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                </svg>
                <span>Local Tips</span>
            </a>
        </div>

        <!-- Two visible prints representing the direct register gait pattern -->
        <div class="paw-tracks">
            <div class="paw" id="left-track"><svg viewBox="0 0 24 24"><path d="M12 2c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3zm-6 3c-1.4 0-2.5 1.1-2.5 2.5S4.6 10 6 10s2.5-1.1 2.5-2.5S7.4 5 6 5zm12 0c-1.4 0-2.5 1.1-2.5 2.5s1.1 2.5 2.5 2.5 2.5-1.1 2.5-2.5S19.4 5 18 5zm-1.5 8c-.6-1.5-2.1-2.5-3.8-2.5h-1.4c-1.7 0-3.2 1-3.8 2.5L5 19h14l-2.5-6z"/></svg></div>
            <div class="paw" id="right-track"><svg viewBox="0 0 24 24"><path d="M12 2c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3zm-6 3c-1.4 0-2.5 1.1-2.5 2.5S4.6 10 6 10s2.5-1.1 2.5-2.5S7.4 5 6 5zm12 0c-1.4 0-2.5 1.1-2.5 2.5s1.1 2.5 2.5 2.5 2.5-1.1 2.5-2.5S19.4 5 18 5zm-1.5 8c-.6-1.5-2.1-2.5-3.8-2.5h-1.4c-1.7 0-3.2 1-3.8 2.5L5 19h14l-2.5-6z"/></svg></div>
        </div>
    </nav>

    <main>
        <h2>Select a category above to begin</h2>
        <p>More details and photos will go here as we build out the site!</p>
    </main>

    <!-- Natural Gait Walking Engine -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const navItems = document.querySelectorAll(".nav-item");
            const navContainer = document.querySelector("nav");
            const leftTrack = document.getElementById("left-track");
            const rightTrack = document.getElementById("right-track");
            
            let lastX = 0; 
            let isWalking = false;

            function executeGait(element) {
                if (isWalking) return; // Prevents animation overlap if scrubbing menus too fast
                
                const elementRect = element.getBoundingClientRect();
                const navRect = navContainer.getBoundingClientRect();
                const targetCenter = elementRect.left - navRect.left + (elementRect.width / 2);
                
                if (targetCenter === lastX) return;
                isWalking = true;

                const movingRight = targetCenter > lastX;
                lastX = targetCenter;

                // Update glowing menu indicator
                navItems.forEach(item => item.classList.remove('glowing'));
                element.classList.add('glowing');

                // One-quarter turn clockwise (90 deg) when heading right, counter-clockwise (-90 deg) when heading left
                const rotation = movingRight ? 90 : -90;

                // Staggered linear sequence positioning (Direct Register)
                const rearOffset = movingRight ? -14 : 14;
                const leadOffset = movingRight ? 14 : -14;

                const rearTargetX = targetCenter + rearOffset - 10;
                const leadTargetX = targetCenter + leadOffset - 10;

                // Determine step order based on heading direction
                const firstUp = movingRight ? leftTrack : rightTrack;
                const firstTarget = movingRight ? rearTargetX : leadTargetX;

                const secondUp = movingRight ? rightTrack : leftTrack;
                const secondTarget = movingRight ? leadTargetX : rearTargetX;

                // STEP 1: Trailing track lifts (vanishes)
                firstUp.style.opacity = "0";

                setTimeout(() => {
                    // STEP 2: Reposition trailing track instantly while completely hidden
                    firstUp.style.transform = `translateX(${firstTarget}px) rotate(${rotation}deg)`;
                    
                    setTimeout(() => {
                        // STEP 3: Trailing track emerges at its new spot
                        firstUp.style.opacity = "1";

                        // STEP 4: Leading track lifts (vanishes) shortly after
                        setTimeout(() => {
                            secondUp.style.opacity = "0";

                            setTimeout(() => {
                                // STEP 5: Reposition leading track instantly while hidden
                                secondUp.style.transform = `translateX(${secondTarget}px) rotate(${rotation}deg)`;
                                
                                setTimeout(() => {
                                    // STEP 6: Leading track emerges at its new spot
                                    secondUp.style.opacity = "1";
                                    isWalking = false; // Sequence complete
                                }, 50);
                            }, 150);
                        }, 100);
                    }, 50);
                }, 150);
            }

            // Set initial standing stance under the first menu link
            if (navItems.length > 0) {
                const initialRect = navItems[0].getBoundingClientRect();
                const navRect = navContainer.getBoundingClientRect();
                const initialCenter = initialRect.left - navRect.left + (initialRect.width / 2);
                lastX = initialCenter;
                
                leftTrack.style.transform = `translateX(${initialCenter - 19}px) rotate(90deg)`;
                rightTrack.style.transform = `translateX(${initialCenter + 9}px) rotate(90deg)`;
            }

            // Bind interactions for hover and mobile touch screens
            navItems.forEach(item => {
                item.addEventListener("mouseenter", function() { executeGait(this); });
                item.addEventListener("touchstart", function() { executeGait(this); });
            });
        });
    </script>
</body>
</html>
