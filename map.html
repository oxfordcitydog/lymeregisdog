<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <title>Lyme Regis Dog Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; }
        #map { height: 100vh; width: 100%; }
        .paw-icon { font-size: 24px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([50.726, -2.936], 13); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

        const params = new URLSearchParams(window.location.search);
        const category = params.get('cat'); 

        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ1ozEE6DOGxnkMLz0N9kKwwzWguTWliJ5CPjqM5ywPv_RzyHzEiSM14IENVG6ilhq18f-9iJd8LKnk/pub?output=csv';

        fetch(csvUrl)
            .then(res => res.text())
            .then(data => {
                const rows = data.split('\n').slice(1);
                rows.forEach(row => {
                    // This uses a regex to handle commas inside quotes in your review text
                    const regex = /(".*?"|[^",]+)(?=\s*,|\s*$)/g;
                    const cols = row.match(regex);
                    if (!cols || cols.length < 8) return;

                    const cat = cols[1] ? cols[1].trim() : "";
                    const name = cols[2];
                    const rating = cols[3];
                    const review = cols[5];
                    const lat = parseFloat(cols[6]);
                    const lng = parseFloat(cols[7]);

                    if (cat === category && !isNaN(lat) && !isNaN(lng)) {
                        const pawIcon = L.divIcon({ html: '🐾', className: 'paw-icon' });
                        L.marker([lat, lng], { icon: pawIcon }).addTo(map)
                         .bindPopup(`${name}<br>${review}<br>Rating: ${rating}/5`);
                    }
                });
            });
    </script>
</body>
</html>
