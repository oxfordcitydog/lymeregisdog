<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <title>Lyme Regis Dog Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; }
        #map { height: 100vh; width: 100%; }
        .paw-icon { font-size: 24px; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ---------------- MAP SETUP ----------------
        const map = L.map('map').setView([50.726, -2.936], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // ---------------- CATEGORY DETECTION ----------------
        const params = new URLSearchParams(window.location.search);
        let category = params.get('cat');

        if (!category) {
            const pathName = window.location.pathname.toLowerCase();
            if (pathName.includes('shop')) category = 'Shops';
            else if (pathName.includes('walk')) category = 'Walks';
            else if (pathName.includes('cafe')) category = 'Cafes';
            else if (pathName.includes('beach')) category = 'Beaches';
        }

        // normalise category (IMPORTANT FIX)
        category = (category || '').trim().toLowerCase();

        // ---------------- DATA SOURCE ----------------
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ1ozEE6DOGxnkMLz0N9kKwwzWguTWIiJ5CPjqM5ywPv_RzyHzEiSM14lENVG6ilhq18f-9iJd8LkNk/pub?output=csv';

        // ---------------- LOAD DATA ----------------
        fetch(csvUrl)
            .then(res => res.text())
            .then(data => {

                const lines = data.split(/\r?\n/);

                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;

                    // ✅ FIX: your sheet is TAB-separated, not comma-separated
                    const cols = lines[i].split('\t');

                    if (cols.length < 8) continue;

                    const cat = (cols[1] || '').trim().toLowerCase();
                    const name = cols[2] || '';
                    const rating = cols[3] || '';
                    const review = cols[5] || '';
                    const lat = parseFloat(cols[6]);
                    const lng = parseFloat(cols[7]);

                    if (cat === category && !isNaN(lat) && !isNaN(lng)) {

                        const pawIcon = L.divIcon({
                            html: '🐾',
                            className: 'paw-icon'
                        });

                        L.marker([lat, lng], { icon: pawIcon })
                            .addTo(map)
                            .bindPopup(`
                                <strong>${name}</strong><br>
                                ${review}<br>
                                Rating: ${rating}/5
                            `);
                    }
                }
            })
            .catch(err => console.error("Error loading map data:", err));
    </script>
</body>
</html>
