<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <title>Lyme Regis Dog Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; }
        #map { height: 100vh; width: 100%; }
        .paw-icon { font-size: 24px; }
        .leaflet-div-icon {
            background: transparent !important;
            border: none !important;
        }
        .locate-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: #FFFFFF;
            border: 2px solid rgba(0,0,0,0.2);
            border-radius: 4px;
            padding: 8px 10px;
            font-size: 1.1rem;
            cursor: pointer;
            line-height: 1;
        }
        .locate-btn:hover { background: #f4f4f4; }
        .you-are-here-icon { font-size: 22px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <button class="locate-btn" id="locate-btn" title="Find places near me">📍 Near Me</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script>
        // ---------------- MAP SETUP ----------------
        const map = L.map('map').setView([50.726, -2.936], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        const markers = L.markerClusterGroup({ maxClusterRadius: 45 });
        map.addLayer(markers);

        // ---------------- ESCAPE HELPER ----------------
        // Review text/names come from a public spreadsheet, so escape before
        // inserting into popup HTML to avoid injecting markup/scripts.
        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // ---------------- CATEGORY DETECTION ----------------
        const params = new URLSearchParams(window.location.search);
        let category = params.get('cat');

        if (!category) {
            const pathName = window.location.pathname.toLowerCase();
            if (pathName.includes('shop')) category = 'Shops';
            else if (pathName.includes('walk')) category = 'Walks';
            else if (pathName.includes('cafe')) category = 'Cafes';
            else if (pathName.includes('beach')) category = 'Beaches';
            else if (pathName.includes('accommodation')) category = 'accommodation';
            else if (pathName.includes('services')) category = 'Services';
        }

        // normalise category
        category = (category || '').trim().toLowerCase();

        // ---------------- DATA SOURCE (SWITCHED TO TSV) ----------------
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSV1_-NajtwAbXLgtZZ_Os98aFK39NIFEu7mKdVmFyXFk2je23448Y71W8Uejz-1FNV38XOM3vueQpJ/pub?output=tsv';

        // ---------------- LOAD DATA ----------------
        fetch(csvUrl)
            .then(res => res.text())
            .then(data => {

                const lines = data.split(/\r?\n/);

                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;

                    // Splitting by tab characters to match the TSV data format
                    const cols = lines[i].split('\t');

                    if (cols.length < 8) continue;

                    const dogName = cols[0] || '';
                    const cat = (cols[1] || '').trim().toLowerCase();
                    const name = cols[2] || '';
                    const rating = cols[3] || '';
                    const w3w = (cols[4] || '').trim();
                    const review = cols[5] || '';
                    const lat = parseFloat(cols[6]);
                    const lng = parseFloat(cols[7]);
                    const avatar = (cols[8] || '').trim() || '🐾';

                    if (cat === category && !isNaN(lat) && !isNaN(lng)) {

                        const pawIcon = L.divIcon({
                            html: '🐾',
                            className: 'paw-icon'
                        });

                        // Create a clean display link if What3Words info exists
                        let w3wLine = '';
                        if (w3w) {
                            w3wLine = 'What3Words: <a href="https://what3words.com/' + encodeURIComponent(w3w) + '" target="_blank" rel="noopener">///' + escapeHtml(w3w) + '</a><br>';
                        }

                        const dogLine = dogName ? ('Reviewed by ' + escapeHtml(avatar) + ' ' + escapeHtml(dogName) + '<br>') : '';

                        const marker = L.marker([lat, lng], { icon: pawIcon })
                            .bindPopup('<strong>' + escapeHtml(name) + '</strong><br>' + dogLine + w3wLine + escapeHtml(review) + '<br>Rating: ' + escapeHtml(rating) + '/5');

                        markers.addLayer(marker);
                    }
                }
            })
            .catch(err => console.error("Error loading map data:", err));

        // ---------------- NEAR ME ----------------
        let youAreHereMarker = null;
        document.getElementById('locate-btn').addEventListener('click', () => {
            if (!navigator.geolocation) {
                alert('Your browser does not support geolocation.');
                return;
            }
            navigator.geolocation.getCurrentPosition((pos) => {
                const { latitude, longitude } = pos.coords;
                if (youAreHereMarker) {
                    map.removeLayer(youAreHereMarker);
                }
                const hereIcon = L.divIcon({ html: '📍', className: 'you-are-here-icon' });
                youAreHereMarker = L.marker([latitude, longitude], { icon: hereIcon })
                    .addTo(map)
                    .bindPopup('You are here').openPopup();
                map.setView([latitude, longitude], 15);
            }, () => {
                alert('Could not get your location. Please check your browser/location permissions.');
            });
        });
    </script>
</body>
</html>
