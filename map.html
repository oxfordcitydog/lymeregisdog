<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <title>Lyme Regis Dog Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden !important; 
        }
        #map { 
            height: 100vh; 
            width: 100%; 
            display: block; 
        }
        .paw-icon { font-size: 24px; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([50.726, -2.936], 12); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

        const params = new URLSearchParams(window.location.search);
        const category = params.get('cat'); 

        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ1ozEE6DOGxnkMLz0N9kKwwzWguTWliJ5CPjqM5ywPv_RzyHzEiSM14IENVG6ilhq18f-9iJd8LKnk/pub?output=csv';

        fetch(csvUrl)
            .then(res => res.text())
            .then(data => {
                const rows = data.split('\n').slice(1);
                rows.forEach(row => {
                    const [dog, cat, name, rating, w3w, review, lat, lng] = row.split(',');
                    
                    if (cat && cat.trim() === category && lat && lng) {
                        const pawIcon = L.divIcon({ html: '🐾', className: 'paw-icon' });
                        L.marker([lat, lng], { icon: pawIcon }).addTo(map)
                         .bindPopup(`${name}<br>${review}<br>Rating: ${rating}/5`);
                    }
                });
            });
    </script>
</body>
</html>
