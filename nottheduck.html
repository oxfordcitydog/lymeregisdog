<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Not The Duck</title>

<style>

body {
    background: black;
    margin: 0;
    font-family: Arial, sans-serif;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    max-width: 1200px;
    margin: 40px auto;
    padding: 20px;
}

.gallery-item img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 8px;
}

</style>

</head>
<body>

<div class="gallery">
  <!-- Row 1 -->
  <div class="gallery-item"><img src="1duck.jpg" alt="Mixed media illustration of a dog and a duck"></div>
  <div class="gallery-item"><img src="2duck.jpg" alt="Mixed media illustration of a character named Margaret"></div>
  <div class="gallery-item"><img src="3duck.jpg" alt="Mixed media illustration of a whippet and hearts"></div>
  <div class="gallery-item"><img src="4duck.jpg" alt="Mixed media illustration of a character named Miss Hyperscrew"></div>


</div>
</body>
</html>
