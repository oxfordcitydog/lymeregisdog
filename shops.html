<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog-Friendly Shops - Lyme Regis Dog</title>

    <style>
        body {
            background-color: #E3F2FD;
            color: #000000;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .fixed-title {
            position: fixed;
            top: 20px;
            right: 30px;
            font-size: 1.25rem;
            font-weight: 600;
            z-index: 1000;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        header {
            text-align: center;
            padding: 30px 20px 10px 20px;
        }

        .content-panel {
            max-width: 900px;
            margin: 20px auto 60px auto;
            background-color: #FFFFFF;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .section-content {
            padding: 30px;
        }

        .action-btn {
            display: inline-block;
            background-color: #1976D2;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            font-weight: 600;
            border-radius: 4px;
            margin-top: 15px;
            transition: background-color 0.2s ease;
        }

        .action-btn:hover {
            background-color: #1565C0;
        }

        @media (max-width: 500px) {
            .content-panel { margin: 10px; }
            .fixed-title { position: static; text-align: center; margin-top: 10px; }
        }
    </style>
</head>
<body>

    <div class="fixed-title">Lyme Regis Dog</div>

    <div style="background-color: #1976D2; padding: 10px 20px;">
        <a href="index.html" style="color: white; text-decoration: none; font-weight: 600; font-size: 0.9rem;">🐾 Home</a> 
        <span style="color: #BBDEFB; margin: 0 10px;">&gt;</span> 
        <span style="color: white; font-size: 0.9rem;">Shops</span>
    </div>

    <header>
        <h1>Dog-Friendly Shops</h1>
        <p>Discover local stores where your dog is as welcome as you are.</p>
    </header>

    <div class="content-panel">
        
        <div class="section-content">
            <h2>Shop Together</h2>
            <p>Click on any marker on the map below to view community reviews and location details for dog-welcoming shops.</p>
            <a href="submit.html" class="action-btn">🐾 Found a New Shop? Add It Here!</a>
        </div>
        
        <iframe src="map.html?cat=Shops" width="100%" height="605px" style="border:none; display:block; overflow:hidden;" scrolling="no"></iframe>

    </div>

</body>
</html>
