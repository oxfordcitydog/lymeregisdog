
<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit a Dog-Friendly Spot - Lyme Regis Dog</title>
    <meta name="description" content="Share your favorite dog-friendly walk, beach, shop, cafe, accommodation or service in the Lyme Regis area with the community.">
    <meta property="og:title" content="Submit a Dog-Friendly Spot - Lyme Regis Dog">
    <meta property="og:description" content="Share your favorite dog-friendly walk, beach, shop, cafe, accommodation or service in the Lyme Regis area with the community.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lymeregisdog.com/submit.html">
    <meta property="og:image" content="https://lymeregisdog.com/web-app-manifest-512x512.png">
    <meta name="twitter:card" content="summary">
    <style>
        body { background-color: #E3F2FD; color: #000000; font-family: Arial, sans-serif; margin: 0; padding: 0; line-height: 1.6; }
        header { text-align: center; padding: 40px 20px 20px 20px; }
        .form-container { max-width: 600px; margin: 20px auto 60px auto; background-color: #FFFFFF; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.95rem; }
        input[type="text"], select, textarea { width: 100%; padding: 10px; border: 2px solid #B0BEC5; border-radius: 4px; font-size: 1rem; box-sizing: border-box; }
        .hint { font-size: 0.8rem; color: #666; margin-top: 4px; }
        .submit-btn { background-color: #1976D2; color: white; border: none; padding: 14px 20px; font-size: 1.1rem; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; }
        .submit-btn:hover { background-color: #1565C0; }
        @media (max-width: 500px) { .form-container { margin: 10px; padding: 20px; } }
    </style>
</head>
<body>

    <div style="background-color: #1976D2; padding: 10px 20px;">
        <a href="index.html" style="color: white; text-decoration: none; font-weight: bold; font-size: 0.9rem;">🐾 Home</a> 
        <span style="color: #BBDEFB; margin: 0 10px;">&gt;</span> 
        <span style="color: white; font-size: 0.9rem;">Submit a Spot</span>
    </div>

    <header>
        <h1>Add a Dog-Friendly Spot</h1>
        <p>Share your favorite local discoveries!</p>
    </header>

    <div class="form-container">
        <form id="form" method="POST">
            <input type="hidden" name="access_key" value="b6894ce2-eb05-41ca-9753-9fa5e3c54a3e">
            
            <div class="form-group">
                <label> Dog's Name:</label>
                <input type="text" name="userName" required placeholder="e.g., Oak">
            </div>

            <div class="form-group">
                <label>Category:</label>
                <select name="category" required>
                    <option value="walks">🐾 Walk</option>
                    <option value="beaches">🏖️ Beach</option>
                    <option value="shops">🛍️ Shop</option>
                    <option value="cafes">☕ Cafe</option>
                    <option value="accommodation">🏠 Accommodation</option>
                    <option value="services">🛎️ Service</option>
                </select>
            </div>

            <div class="form-group">
                <label>Location Name (Max 35 chars):</label>
                <input type="text" name="locationName" maxlength="35" required placeholder="e.g., Woodland Stream Trail">
            </div>

            <div class="form-group">
                <label>Paw Rating:</label>
                <select name="rating" required>
                       <option value="5 Paws">🐾🐾🐾🐾🐾</option>
                    <option value="4 Paws">🐾🐾🐾🐾</option>
                    <option value="3 Paws">🐾🐾🐾</option>
                    <option value="2 Paws">🐾🐾</option>
                    <option value="1 Paw">🐾</option>
                </select>
            </div>

            <div class="form-group">
                <label>what3words Address:</label>
                <input type="text" name="w3w" required placeholder="e.g., filled.count.soap" pattern="[a-zA-Z]+\.[a-zA-Z]+\.[a-zA-Z]+" title="Format: word.word.word (e.g. filled.count.soap)">
            </div>

            <div class="form-group">
                <label>Review (Max 100 chars):</label>
                <textarea name="review" rows="4" maxlength="100" required placeholder="Keep it short and sweet..."></textarea>
                <span class="hint">This length ensures it fits perfectly on the map.</span>
            </div>

            <button type="submit" class="submit-btn">🐾 Submit to the Map</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            const response = await fetch("https://api.web3forms.com/submit", { method: "POST", body: formData });
            if (response.ok) {
                window.location.href = "success.html";
            } else {
                alert("Something went wrong. Please try again.");
            }
        });
    </script>
</body>
</html>
