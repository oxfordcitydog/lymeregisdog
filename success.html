        h1 {

            border-radius: 4px;

        .home-btn:hover { background-color: #1565C0; }
        .home-btn:active { transform: scale(0.98); }

        .social-item svg { width: 26px; height: 26px; stroke: black; fill: none; margin-bottom: 5px; transition: 0.3s; }
        .social-item:hover svg { filter: drop-shadow(0 0 8px #1976D2); stroke: #1976D2; }
        .social-item span { font-size: 0.75rem; transition: 0.3s; }
        .social-item:hover span { color: #1976D2; }

        @media (max-width: 550px) {
            .success-container { margin: 20px; padding: 30px 20px; }
            .fixed-title { position: static; margin-bottom: 20px; }
        }
